<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notícias PT</title>
<style>
  :root {
    --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0ede8; --text2: #9a9690; --text3: #5c5a57;
    --accent: #e8a84c; --accent2: #c48830; --red: #e05252;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header {
    height: 52px; min-height: 52px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.25rem; background: var(--bg); z-index: 100; flex-shrink: 0;
  }
  .logo { font-size: 1rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
  .logo span { color: var(--text2); font-size: 0.7rem; letter-spacing: 0.04em; text-transform: none; margin-left: 0.6rem; font-family: sans-serif; }
  .header-right { display: flex; align-items: center; gap: 0.75rem; }
  #status { font-size: 0.68rem; font-family: sans-serif; color: var(--text3); }
  #status.error { color: var(--red); }
  .btn {
    font-family: sans-serif; font-size: 0.68rem; background: transparent;
    border: 1px solid var(--border2); color: var(--text2); padding: 0.25rem 0.65rem;
    border-radius: 3px; cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase; transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent2); color: var(--accent); }
  .filter-bar { padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); display: flex; gap: 0.4rem; flex-wrap: wrap; background: var(--bg); flex-shrink: 0; }
  .filter-btn {
    font-family: sans-serif; font-size: 0.65rem; padding: 0.22rem 0.6rem;
    border: 1px solid var(--border2); border-radius: 2rem; background: transparent;
    color: var(--text2); cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em; text-transform: uppercase;
  }
  .filter-btn:hover { border-color: var(--accent2); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0f0f0f; font-weight: bold; }
  .source-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .layout { display: flex; flex: 1; overflow: hidden; }
  #feed-panel { width: 340px; min-width: 220px; max-width: 520px; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  #feed-panel::-webkit-scrollbar { width: 4px; }
  #feed-panel::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }
  .article { border-bottom: 1px solid var(--border); padding: 0.85rem 1rem; cursor: pointer; transition: background 0.1s; }
  .article:hover { background: var(--bg2); }
  .article.active { background: var(--bg3); border-left: 2px solid var(--accent); padding-left: calc(1rem - 2px); }
  .article-meta { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.2rem; }
  .source-tag { font-family: sans-serif; font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase; font-weight: bold; }
  .article-time { font-family: sans-serif; font-size: 0.62rem; color: var(--text3); }
  .article h2 { font-size: 0.9rem; font-weight: normal; line-height: 1.4; color: var(--text); margin-bottom: 0.25rem; }
  .article.active h2, .article:hover h2 { color: var(--accent); }
  .article-desc { font-size: 0.78rem; color: var(--text2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  #resize-handle { width: 4px; cursor: col-resize; background: transparent; flex-shrink: 0; transition: background 0.15s; }
  #resize-handle:hover, #resize-handle.dragging { background: var(--accent2); }
  #reader-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
  #reader-toolbar { height: 44px; min-height: 44px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; padding: 0 1rem; flex-shrink: 0; }
  #reader-title { font-family: sans-serif; font-size: 0.78rem; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #reader-frame { flex: 1; border: none; background: #fff; width: 100%; }
  #reader-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); font-family: sans-serif; font-size: 0.85rem; gap: 0.5rem; }
  #reader-empty .hint { font-size: 2rem; opacity: 0.3; }
  .skel { border-bottom: 1px solid var(--border); padding: 0.85rem 1rem; }
  .skel-line { height: 10px; border-radius: 2px; background: var(--bg3); margin-bottom: 7px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.9} }
  .empty-state { padding: 3rem 1rem; text-align: center; font-family: sans-serif; color: var(--text3); font-size: 0.82rem; line-height: 2; }
</style>
</head>
<body>

<header>
  <div class="logo">Notícias PT <span>leitor de feeds</span></div>
  <div class="header-right">
    <span id="status">A carregar...</span>
    <button class="btn" id="btn-open" style="display:none" onclick="openExternal()">↗ Abrir</button>
  </div>
</header>

<div class="filter-bar" id="filter-bar"></div>

<div class="layout">
  <div id="feed-panel"><div id="feed"></div></div>
  <div id="resize-handle"></div>
  <div id="reader-panel">
    <div id="reader-toolbar">
      <span id="reader-title">Seleciona uma notícia para ler</span>
    </div>
    <div id="reader-empty"><div class="hint">📰</div><div>Clica numa notícia para a ler aqui</div></div>
    <iframe id="reader-frame" style="display:none" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
  </div>
</div>

<script>
const SOURCES = [
  { id: 'observador',  name: 'Observador',        color: '#e8a84c' },
  { id: 'rtp',         name: 'RTP Notícias',       color: '#e05252' },
  { id: 'dn',          name: 'Diário de Notícias', color: '#6b9fd4' },
  { id: 'maisfutebol', name: 'Maisfutebol',        color: '#4fc48a' },
  { id: 'sapo',        name: 'SAPO',               color: '#9b7ee8' },
  { id: 'nam',         name: 'Notícias ao Minuto', color: '#e07a5f' },
  { id: 'pplware',     name: 'Pplware',            color: '#5bc4d4' },
  { id: 'autosport',   name: 'Autosport',          color: '#f0c040' },
];

let allArticles = [];
let activeFilter = 'all';
let currentLink = null;

function timeAgo(s) {
  if (!s) return '';
  const d = new Date(s); if (isNaN(d)) return '';
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60) return 'agora';
  if (diff < 3600) return `há ${Math.floor(diff/60)}min`;
  if (diff < 86400) return `há ${Math.floor(diff/3600)}h`;
  return `há ${Math.floor(diff/86400)}d`;
}

function setFilter(id, btn) {
  activeFilter = id;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
}

function openArticle(link, title, el) {
  document.querySelectorAll('.article').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
  currentLink = link;
  document.getElementById('reader-title').textContent = title;
  document.getElementById('reader-empty').style.display = 'none';
  document.getElementById('reader-frame').style.display = 'block';
  document.getElementById('reader-frame').src = link;
  document.getElementById('btn-open').style.display = '';
}
function openExternal() { if (currentLink) window.open(currentLink, '_blank'); }

function renderFeed() {
  const feed = document.getElementById('feed');
  let articles = activeFilter === 'all' ? [...allArticles] : allArticles.filter(a => a.sourceId === activeFilter);
  articles.sort((a, b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));
  if (!articles.length) { feed.innerHTML = '<div class="empty-state">Sem notícias.</div>'; return; }
  feed.innerHTML = '';
  articles.forEach(a => {
    const div = document.createElement('div');
    div.className = 'article';
    div.innerHTML = `
      <div class="article-meta">
        <span class="source-dot" style="background:${a.color}"></span>
        <span class="source-tag" style="color:${a.color}">${a.sourceName}</span>
        <span class="article-time">${timeAgo(a.pubDate)}</span>
      </div>
      <h2>${a.title}</h2>
      ${a.description ? `<p class="article-desc">${a.description}</p>` : ''}`;
    div.addEventListener('click', () => openArticle(a.link, a.title, div));
    feed.appendChild(div);
  });
}

function buildFilters() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = `<button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>`;
  SOURCES.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.onclick = function() { setFilter(s.id, this); };
    btn.innerHTML = `<span class="source-dot" style="background:${s.color}"></span>${s.name}`;
    bar.appendChild(btn);
  });
}

async function loadFeeds() {
  document.getElementById('feed').innerHTML = [1,2,3,4,5].map(() =>
    `<div class="skel"><div class="skel-line" style="width:30%"></div><div class="skel-line" style="width:80%"></div><div class="skel-line" style="width:55%"></div></div>`).join('');
  try {
    const res = await fetch('https://raw.githubusercontent.com/schiban/noticias-pt/main/docs/feeds.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allArticles = data.articles || [];
    const t = new Date(data.updated).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('status').textContent = `${allArticles.length} notícias · atualizado às ${t} UTC`;
    renderFeed();
  } catch(e) {
    document.getElementById('status').textContent = 'Erro ao carregar feeds.json';
    document.getElementById('status').className = 'error';
    document.getElementById('feed').innerHTML = '<div class="empty-state">Erro ao carregar notícias.</div>';
  }
}

// Resize handle
(function() {
  const handle = document.getElementById('resize-handle');
  const panel = document.getElementById('feed-panel');
  let dragging = false, startX, startW;
  handle.addEventListener('mousedown', e => { dragging = true; startX = e.clientX; startW = panel.offsetWidth; handle.classList.add('dragging'); document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; });
  document.addEventListener('mousemove', e => { if (!dragging) return; panel.style.width = Math.min(520, Math.max(220, startW + (e.clientX - startX))) + 'px'; });
  document.addEventListener('mouseup', () => { if (!dragging) return; dragging = false; handle.classList.remove('dragging'); document.body.style.cursor = ''; document.body.style.userSelect = ''; });
})();

buildFilters();
loadFeeds();
</script>
</body>
</html>
