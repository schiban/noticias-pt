<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notícias PT</title>
<style>
  :root {
    --bg: #111; --bg2: #1c1c1c; --bg3: #252525;
    --border: rgba(255,255,255,0.07);
    --text: #ede9e3; --text2: #8a8680; --text3: #4a4845;
    --accent: #e8a84c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 0 1rem; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-size: 0.95rem; font-weight: 600; color: var(--accent); letter-spacing: 0.05em; }
  #status { font-size: 0.68rem; color: var(--text3); }
  #status.error { color: #e05252; }

  .filter-bar {
    position: sticky; top: 52px; z-index: 99;
    background: var(--bg); border-bottom: 1px solid var(--border);
    display: flex; gap: 0.4rem; padding: 0.6rem 1rem;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    font-size: 0.72rem; padding: 0.3rem 0.75rem;
    border: 1px solid var(--border); border-radius: 2rem;
    background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #111; font-weight: 600; }
  .source-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; margin-right: 5px; vertical-align: middle; position: relative; top: -1px; }

  #feed { }
  .article {
    display: block; text-decoration: none;
    border-bottom: 1px solid var(--border);
    padding: 0.9rem 1rem;
    active-color: var(--bg2);
    -webkit-tap-highlight-color: transparent;
  }
  .article:active { background: var(--bg2); }
  .article-meta { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.35rem; }
  .source-tag { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .article-time { font-size: 0.62rem; color: var(--text3); margin-left: auto; }
  .article h2 { font-size: 0.92rem; font-weight: 500; line-height: 1.45; color: var(--text); margin-bottom: 0.25rem; }
  .article-desc { font-size: 0.78rem; color: var(--text2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .skel { border-bottom: 1px solid var(--border); padding: 0.9rem 1rem; }
  .skel-line { height: 10px; border-radius: 3px; background: var(--bg3); margin-bottom: 8px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.35} 50%{opacity:0.8} }
  .empty-state { padding: 3rem 1rem; text-align: center; color: var(--text3); font-size: 0.85rem; }
</style>
</head>
<body>

<header>
  <div class="logo">Notícias PT</div>
  <span id="status">A carregar…</span>
</header>

<div class="filter-bar" id="filter-bar"></div>
<div id="feed"></div>

<script>
const SOURCES = [
  { id: 'observador',  name: 'Observador',        color: '#e8a84c' },
  { id: 'rtp',         name: 'RTP',               color: '#e05252' },
  { id: 'dn',          name: 'DN',                color: '#6b9fd4' },
  { id: 'maisfutebol', name: 'Maisfutebol',        color: '#4fc48a' },
  { id: 'sapo',        name: 'SAPO',              color: '#9b7ee8' },
  { id: 'nam',         name: 'Notícias ao Min.',   color: '#e07a5f' },
  { id: 'pplware',     name: 'Pplware',            color: '#5bc4d4' },
  { id: 'autosport',   name: 'Autosport',          color: '#f0c040' },
];

let allArticles = [];
let activeFilter = 'all';

function timeAgo(s) {
  if (!s) return '';
  const d = new Date(s); if (isNaN(d)) return '';
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60) return 'agora';
  if (diff < 3600) return `${Math.floor(diff/60)}m`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h`;
  return `${Math.floor(diff/86400)}d`;
}

function setFilter(id, btn) {
  activeFilter = id;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
}

function renderFeed() {
  const feed = document.getElementById('feed');
  let articles = activeFilter === 'all' ? [...allArticles] : allArticles.filter(a => a.sourceId === activeFilter);
  articles.sort((a, b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));
  if (!articles.length) { feed.innerHTML = '<div class="empty-state">Sem notícias.</div>'; return; }
  feed.innerHTML = '';
  articles.forEach(a => {
    const el = document.createElement('a');
    el.className = 'article';
    el.href = a.link;
    el.target = '_blank';
    el.rel = 'noopener noreferrer';
    el.innerHTML = `
      <div class="article-meta">
        <span class="source-dot" style="background:${a.color}"></span>
        <span class="source-tag" style="color:${a.color}">${a.sourceName}</span>
        <span class="article-time">${timeAgo(a.pubDate)}</span>
      </div>
      <h2>${a.title}</h2>
      ${a.description ? `<p class="article-desc">${a.description}</p>` : ''}`;
    feed.appendChild(el);
  });
}

function buildFilters() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = `<button class="filter-btn active" onclick="setFilter('all',this)">Todas</button>`;
  SOURCES.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.onclick = function() { setFilter(s.id, this); };
    btn.innerHTML = `<span class="source-dot" style="background:${s.color}"></span>${s.name}`;
    bar.appendChild(btn);
  });
}

async function loadFeeds() {
  document.getElementById('feed').innerHTML = [1,2,3,4,5,6].map(() =>
    `<div class="skel"><div class="skel-line" style="width:28%"></div><div class="skel-line" style="width:85%"></div><div class="skel-line" style="width:60%"></div></div>`).join('');
  try {
    const res = await fetch('https://raw.githubusercontent.com/schiban/noticias-pt/main/docs/feeds.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allArticles = data.articles || [];
    const t = new Date(data.updated).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('status').textContent = `${allArticles.length} · ${t}`;
    renderFeed();
  } catch(e) {
    document.getElementById('status').textContent = 'Erro';
    document.getElementById('status').className = 'error';
    document.getElementById('feed').innerHTML = '<div class="empty-state">Erro ao carregar notícias.</div>';
  }
}

buildFilters();
loadFeeds();
</script>
</body>
</html>
